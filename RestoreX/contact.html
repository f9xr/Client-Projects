<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact RestoreX Support">
    <title>RestoreX | Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="bot_logo.jpg">
    <style>
        html { font-size: 110%; }
        body { font-family: 'Manrope', sans-serif; background-color: #0b1120; color: #f8fafc; line-height: 1.6; margin: 0; padding: 4rem 5%; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; text-align: center; background: #05080f; padding: 4rem; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.05); }
        h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; margin-bottom: 1rem; color: #fff; }
        p { color: #94a3b8; font-size: 1.2rem; margin-bottom: 3rem; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem; color: #3b82f6; text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        .contact-options { display: flex; flex-direction: column; gap: 1.5rem; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.8rem; padding: 1.2rem; border-radius: 16px; font-weight: 600; text-decoration: none; font-size: 1.1rem; transition: all 0.3s ease; }
        .btn-discord { background-color: #5865F2; color: white; }
        .btn-discord:hover { background-color: #4752C4; transform: translateY(-3px); }
        .btn-email { background-color: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-email:hover { background-color: rgba(255,255,255,0.15); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        <h1>Get in Touch</h1>
        <p>Whether you have a question, found a bug, or need help setting up advanced features, we're here to help.</p>
        
        <div class="contact-options">
            <a href="https://discord.gg/mPRhYxyVQB" target="_blank" class="btn btn-discord">
                <i class="fa-brands fa-discord"></i> Join Support Discord
            </a>
            <a href="mailto:support@restorex.ddns.net" class="btn btn-email">
                <i class="fa-solid fa-envelope"></i> Email Support
            </a>
        </div>
    </div>
</body>
</html>
